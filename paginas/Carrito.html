<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito | Splash Store</title>
    <link rel="icon" type="image/png" href="../recursos/LogoFinal.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../estilos/styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="https://i.imgur.com/WxlyNDJ.png" alt="Splash Store">
            <span>SPLASH STORE</span>
        </div>

        <nav class="main-nav">
            <a href="PagPrincipal.html">Inicio</a>
            <a href="PagGames.html">Juegos</a>
            <a href="PagAcces.html">Accesorios</a>
            <button class="nav-button cart-button" type="button" aria-label="Abrir carrito">
                <img class="cart-icon" src="../recursos/anadir-a-la-cesta.png" alt="Carrito"><span class="cart-count" data-cart-count>0</span>
            </button>
        </nav>
    </header>

    <div class="cart-overlay"></div>
    <aside class="cart-panel" aria-hidden="true">
        <div class="cart-header">
            <h2>Carrito</h2>
            <button class="cart-close" type="button" aria-label="Cerrar carrito">&times;</button>
        </div>
        <div class="cart-content" data-cart-panel-content></div>
    </aside>

    <main class="cart-page">
        <h1>Carrito</h1>
        <section data-cart-page-content></section>
    </main>

    <footer>
        <p>&copy; 2026 Splash Store - Todos los derechos reservados</p>
    </footer>

    <script src="../recursos/articulos.js"></script>
    <script src="../recursos/nav.js"></script>
</body>
</html>
